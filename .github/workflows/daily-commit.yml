name: Daily Automated Commit

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  auto-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Committer (23f2004968@ds.study.iitm.ac.in)
        run: |
          git config --global user.email "23f2004968@ds.study.iitm.ac.in"
          git config --global user.name "GitHub Action Bot"

      - name: Create Commit
        run: |
          # Pehle remote changes ko pull karein taaki sync bana rahe
          git pull origin main --rebase
          echo "Daily update: $(date)" >> automation_log.txt
          git add automation_log.txt
          git commit -m "Automated daily update: $(date)"
          git push
